<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>LATTICE</title>
    <style>
      :root {
        --cyan: #00ffff;
        --blue: #00aaff;
        --green: #00ff88;
        --red: #ff3333;
        --ink: #cfe9ff;
        --mono: "Space Mono", "SFMono-Regular", "Roboto Mono", ui-monospace,
          "Courier New", monospace;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #000000;
        overflow: hidden;
        font-family: var(--mono);
        color: var(--ink);
        cursor: default;
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }

      canvas#scene {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        display: block;
        /* The canvas itself receives NO pointer events. A transparent
           #input-layer on top captures them for OrbitControls + raycasting,
           so the canvas can never carry a hand cursor or a click handler. */
        pointer-events: none;
        cursor: default;
      }

      /* --- subtle vignette to darken the edges of the frame --- */
      #vignette {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        background: radial-gradient(
          ellipse at center,
          rgba(0, 0, 0, 0) 48%,
          rgba(0, 0, 0, 0.55) 82%,
          rgba(0, 0, 0, 0.92) 100%
        );
      }

      /* --- transparent input surface (the ONLY thing over the scene that
             captures pointer events) — drives cube selection + OrbitControls.
             Always a default cursor, never a pointer, and it has no click /
             tap handler that could restart the game. --- */
      #input-layer {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: auto;
        cursor: default !important;
        touch-action: none; /* we own all touch gestures (rotate/select) */
        background: transparent;
      }

      /* --- HUD layer (above the input surface; click-through except the
             explicit buttons, which re-enable pointer-events) --- */
      #hud {
        position: fixed;
        inset: 0;
        z-index: 3;
        pointer-events: none;
        font-family: var(--mono);
      }

      #hud button {
        pointer-events: auto;
        font-family: var(--mono);
        background: transparent;
        border: none;
        color: var(--ink);
        letter-spacing: 0.25em;
        font-size: 13px;
        /* No hand cursor by default — only the prominent Submit button and
           the Play Again button opt in (see #submit-btn and #message-btn). */
        cursor: default;
        text-transform: uppercase;
        transition: color 0.2s ease, text-shadow 0.2s ease, transform 0.12s ease;
        padding: 8px 10px;
      }
      #hud button:hover {
        color: #ffffff;
        text-shadow: 0 0 14px var(--cyan), 0 0 26px var(--blue);
      }
      #hud button:active {
        transform: scale(0.94);
      }
      #hud button:disabled {
        opacity: 0.28;
        cursor: default;
        text-shadow: none;
      }

      /* --- top center: the 60s countdown clock --- */
      #timer {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        font-size: clamp(34px, 5.6vw, 56px);
        font-weight: 700;
        letter-spacing: 0.12em;
        color: var(--ink);
        text-shadow: 0 0 18px rgba(0, 170, 255, 0.55),
          0 0 38px rgba(0, 170, 255, 0.3);
        font-variant-numeric: tabular-nums;
      }
      #timer.low {
        color: var(--red);
        animation: timerpulse 0.7s ease-in-out infinite alternate;
      }
      @keyframes timerpulse {
        from {
          text-shadow: 0 0 16px rgba(255, 40, 40, 0.6),
            0 0 34px rgba(255, 30, 30, 0.35);
          transform: translateX(-50%) scale(1);
        }
        to {
          text-shadow: 0 0 32px rgba(255, 70, 70, 1),
            0 0 72px rgba(255, 30, 30, 0.7);
          transform: translateX(-50%) scale(1.09);
        }
      }

      /* --- top center: the word being formed --- */
      #word-top {
        position: absolute;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        max-width: 90vw;
        text-align: center;
        pointer-events: none;
      }
      #current-word {
        font-size: clamp(28px, 5.2vw, 58px);
        font-weight: 700;
        letter-spacing: 0.28em;
        padding-left: 0.28em; /* balance the trailing letter-spacing */
        white-space: nowrap;
        color: #ffffff;
        text-shadow: 0 0 16px rgba(0, 170, 255, 0.45),
          0 0 34px rgba(0, 170, 255, 0.25);
        min-height: 1.1em;
        transition: color 0.18s ease, text-shadow 0.18s ease;
      }
      #current-word.valid {
        color: var(--cyan);
        animation: validglow 0.9s ease-in-out infinite alternate;
      }
      @keyframes validglow {
        from {
          text-shadow: 0 0 18px rgba(0, 255, 255, 0.6),
            0 0 40px rgba(0, 255, 200, 0.4);
        }
        to {
          text-shadow: 0 0 30px rgba(0, 255, 255, 0.95),
            0 0 70px rgba(0, 255, 170, 0.65);
        }
      }
      #current-word.shake {
        color: var(--red);
        animation: shake 0.3s ease;
      }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20% { transform: translateX(-9px); }
        40% { transform: translateX(9px); }
        60% { transform: translateX(-6px); }
        80% { transform: translateX(6px); }
      }

      /* --- bottom-left cluster: new game + hint button + instruction --- */
      #bottom-left {
        position: absolute;
        bottom: 30px;
        left: 36px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        max-width: 62vw;
      }
      /* Small, muted mid-game reset. Deliberately subtle and tucked in the
         corner so it isn't hit by accident, but available any time. */
      #reset-btn {
        font-size: 11px !important;
        letter-spacing: 0.3em !important;
        color: rgba(150, 205, 245, 0.6);
        cursor: pointer;
        padding: 6px 8px;
      }
      #reset-btn:hover {
        color: #ffffff;
        text-shadow: 0 0 14px var(--cyan), 0 0 26px var(--blue);
      }
      #hint {
        font-size: 12px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: rgba(120, 180, 230, 0.55);
        text-shadow: 0 0 10px rgba(0, 120, 200, 0.3);
        transition: opacity 0.5s ease;
        white-space: nowrap;
      }
      #hint-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      #hint-btn {
        color: #ffce5c !important;
        text-shadow: 0 0 12px rgba(255, 190, 60, 0.45);
        font-size: 14px !important;
        letter-spacing: 0.34em !important;
        padding: 6px 8px;
      }
      #hint-btn:hover:not(:disabled) {
        color: #ffffff !important;
        text-shadow: 0 0 14px #ffce5c, 0 0 28px rgba(255, 170, 40, 0.6);
      }
      #hint-dots {
        font-size: 15px;
        letter-spacing: 0.22em;
        color: #ffce5c;
        text-shadow: 0 0 12px rgba(255, 190, 60, 0.55);
      }

      /* --- top right: score --- */
      #score-wrap {
        position: absolute;
        top: 30px;
        right: 36px;
        text-align: right;
        line-height: 1.1;
      }
      #score-label {
        font-size: 11px;
        letter-spacing: 0.42em;
        color: rgba(140, 200, 245, 0.6);
      }
      #score {
        font-size: clamp(28px, 4vw, 46px);
        font-weight: 700;
        color: #ffffff;
        text-shadow: 0 0 16px rgba(0, 200, 255, 0.6),
          0 0 32px rgba(0, 160, 255, 0.3);
      }

      /* --- top left: words found --- */
      #words-found {
        position: absolute;
        top: 30px;
        left: 36px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-width: 36vw;
      }
      #wf-label {
        font-size: 11px;
        letter-spacing: 0.42em;
        color: rgba(140, 200, 245, 0.6);
        margin-bottom: 2px;
      }
      .found-item {
        font-size: 15px;
        letter-spacing: 0.18em;
        color: var(--green);
        text-shadow: 0 0 12px rgba(0, 255, 136, 0.5);
        animation: foundin 0.6s ease both;
        white-space: nowrap;
      }
      .found-item .pts {
        color: rgba(160, 220, 255, 0.7);
        margin-left: 8px;
        font-size: 12px;
      }
      @keyframes foundin {
        from {
          opacity: 0;
          transform: translateX(-14px);
          filter: brightness(2.2);
        }
        to {
          opacity: 1;
          transform: translateX(0);
          filter: brightness(1);
        }
      }

      /* --- bottom center: the prominent SUBMIT button --- */
      #bottom-center {
        position: absolute;
        bottom: 34px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      /* Bright, high-contrast call-to-action: cyan fill, black bold text,
         glowing cyan halo so it clearly stands out from the rest of the HUD. */
      #submit-btn {
        font-size: 20px !important;
        font-weight: 700 !important;
        letter-spacing: 0.4em !important;
        color: #000000 !important;
        background: #00ffff !important;
        border-radius: 6px !important;
        padding: 14px 34px !important;
        cursor: pointer;
        text-shadow: none !important;
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.75),
          0 0 46px rgba(0, 255, 255, 0.4) !important;
      }
      #submit-btn:hover {
        color: #000000 !important;
        background: #5cffff !important;
        text-shadow: none !important;
        box-shadow: 0 0 28px rgba(0, 255, 255, 0.95),
          0 0 64px rgba(0, 255, 255, 0.55) !important;
      }

      /* --- bottom right: the TRIES counter (where New Game used to be) --- */
      #tries-row {
        position: absolute;
        bottom: 34px;
        right: 32px;
        font-size: 12px;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: rgba(150, 205, 245, 0.8);
        text-shadow: 0 0 10px rgba(0, 160, 255, 0.3);
      }
      #tries-dots {
        margin-left: 6px;
        font-size: 14px;
        letter-spacing: 0.2em;
        color: var(--cyan);
        text-shadow: 0 0 12px rgba(0, 255, 255, 0.55);
      }
      #tries-row.danger,
      #tries-row.danger #tries-dots {
        color: var(--red);
        text-shadow: 0 0 14px rgba(255, 60, 60, 0.7);
      }

      /* --- centered message overlay (win / dead) --- */
      #message-overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.8s ease;
        background: radial-gradient(
          ellipse at center,
          rgba(0, 10, 30, 0.35) 0%,
          rgba(0, 0, 0, 0.0) 70%
        );
      }
      #message-overlay.show {
        opacity: 1;
        /* Overlay itself stays click-through; only the Play Again button
           (#message-btn, pointer-events: auto) catches clicks. */
      }
      #message-title {
        font-size: clamp(34px, 8vw, 92px);
        font-weight: 700;
        letter-spacing: 0.3em;
        padding-left: 0.3em;
        color: #ffffff;
        text-align: center;
        text-shadow: 0 0 26px rgba(0, 255, 255, 0.8),
          0 0 70px rgba(0, 180, 255, 0.5);
        animation: titlepulse 2.4s ease-in-out infinite alternate;
      }
      @keyframes titlepulse {
        from {
          text-shadow: 0 0 26px rgba(0, 255, 255, 0.6),
            0 0 60px rgba(0, 180, 255, 0.35);
        }
        to {
          text-shadow: 0 0 44px rgba(0, 255, 255, 1),
            0 0 110px rgba(0, 200, 255, 0.7);
        }
      }
      #message-sub {
        font-size: 15px;
        letter-spacing: 0.3em;
        color: rgba(170, 220, 255, 0.85);
        text-transform: uppercase;
        text-align: center;
      }
      #message-btn {
        pointer-events: auto;
        font-family: var(--mono);
        background: transparent;
        border: none;
        color: var(--cyan);
        letter-spacing: 0.45em;
        font-size: 18px;
        cursor: pointer;
        text-transform: uppercase;
        padding: 12px 22px;
        text-shadow: 0 0 16px rgba(0, 255, 255, 0.5);
        transition: transform 0.12s ease, text-shadow 0.2s ease;
      }
      #message-btn:hover {
        color: #ffffff;
        text-shadow: 0 0 22px var(--cyan), 0 0 44px var(--blue);
      }
      #message-btn:active {
        transform: scale(0.94);
      }

      #loading {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        color: rgba(150, 205, 245, 0.8);
        letter-spacing: 0.5em;
        font-size: 13px;
        text-transform: uppercase;
        transition: opacity 0.6s ease;
      }
      #loading.hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* =====================  MOBILE / SMALL SCREENS  ===================== */
      /* Narrow (portrait phone) screens: shrink fonts, tuck the HUD into the
         corners with safe-area padding, and stack the bottom controls so
         nothing overlaps. The canvas itself always fills the viewport. */
      @media (max-width: 640px) {
        #words-found {
          top: calc(8px + env(safe-area-inset-top));
          left: calc(10px + env(safe-area-inset-left));
          max-width: 44vw;
          gap: 3px;
        }
        #wf-label {
          font-size: 9px;
          letter-spacing: 0.22em;
        }
        .found-item {
          font-size: 12px;
          letter-spacing: 0.08em;
        }
        .found-item .pts {
          font-size: 10px;
          margin-left: 5px;
        }

        #score-wrap {
          top: calc(8px + env(safe-area-inset-top));
          right: calc(10px + env(safe-area-inset-right));
        }
        #score-label {
          font-size: 9px;
          letter-spacing: 0.22em;
        }
        #score {
          font-size: clamp(20px, 7vw, 30px);
        }

        #timer {
          top: calc(6px + env(safe-area-inset-top));
          font-size: clamp(26px, 9vw, 40px);
        }

        #word-top {
          top: calc(52px + env(safe-area-inset-top));
          max-width: 96vw;
        }
        #current-word {
          font-size: clamp(20px, 6.5vw, 34px);
          letter-spacing: 0.16em;
          padding-left: 0.16em;
        }

        /* The "click cubes" instruction is desktop-only chrome — hide it on
           phones so the HINT control stays compact in the corner. */
        #hint {
          display: none;
        }
        #bottom-left {
          bottom: calc(12px + env(safe-area-inset-bottom));
          left: calc(10px + env(safe-area-inset-left));
          gap: 6px;
          max-width: 34vw;
        }
        #hint-btn {
          font-size: 12px !important;
          letter-spacing: 0.18em !important;
          padding: 6px 4px;
        }
        #hint-dots {
          font-size: 13px;
        }

        #bottom-center {
          bottom: calc(12px + env(safe-area-inset-bottom));
          gap: 6px;
        }
        #submit-btn {
          font-size: 16px !important;
          letter-spacing: 0.3em !important;
          padding: 11px 24px !important;
        }
        #tries-row {
          bottom: calc(14px + env(safe-area-inset-bottom));
          right: calc(10px + env(safe-area-inset-right));
          font-size: 10px;
          letter-spacing: 0.18em;
        }
        #tries-dots {
          font-size: 12px;
        }

        #message-title {
          font-size: clamp(28px, 11vw, 60px);
          letter-spacing: 0.16em;
          padding-left: 0.16em;
        }
        #message-sub {
          font-size: 12px;
          letter-spacing: 0.16em;
          padding: 0 16px;
        }
        #message-btn {
          font-size: 15px;
          letter-spacing: 0.3em;
        }
      }

      /* Short screens (landscape phones): pull the top/bottom clusters in and
         keep the timer/word from eating the middle of the board. */
      @media (max-height: 500px) {
        #timer {
          font-size: clamp(22px, 7vh, 34px);
          top: calc(4px + env(safe-area-inset-top));
        }
        #word-top {
          top: calc(40px + env(safe-area-inset-top));
        }
        #current-word {
          font-size: clamp(18px, 6vh, 30px);
        }
        #words-found,
        #score-wrap {
          top: calc(6px + env(safe-area-inset-top));
        }
        #bottom-left,
        #bottom-center,
        #tries-row {
          bottom: calc(8px + env(safe-area-inset-bottom));
        }
      }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div id="vignette"></div>
    <!-- Transparent surface that captures all pointer input for the scene
         (OrbitControls + cube raycasting). No click/reset handler lives here. -->
    <div id="input-layer"></div>

    <div id="hud">
      <div id="words-found">
        <div id="wf-label">WORDS FOUND</div>
      </div>

      <div id="score-wrap">
        <div id="score-label">SCORE</div>
        <div id="score">0</div>
      </div>

      <div id="timer">60</div>

      <div id="word-top">
        <div id="current-word"></div>
      </div>

      <div id="bottom-left">
        <button id="reset-btn" type="button">NEW GAME</button>
        <div id="hint-row">
          <button id="hint-btn" type="button">HINT</button>
          <span id="hint-dots">●●●</span>
        </div>
        <div id="hint">CLICK CUBES TO SPELL A WORD</div>
      </div>

      <div id="bottom-center">
        <button id="submit-btn" type="button">SUBMIT</button>
      </div>

      <div id="tries-row">TRIES <span id="tries-dots">●●●</span></div>
    </div>

    <div id="message-overlay">
      <div id="message-title"></div>
      <div id="message-sub"></div>
      <button id="message-btn" type="button">New Game</button>
    </div>

    <div id="loading">LOADING DICTIONARY</div>

    <script type="module" src="/src/game.js"></script>
  </body>
</html>
